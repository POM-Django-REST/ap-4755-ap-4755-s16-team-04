<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Автори книг</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            background-color: #f9f9f9;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header-section h2 {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
        }
        .btn-add {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
        }
        .btn-add:hover {
            background: #0056b3;
        }
        .author-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .author-name {
            font-size: 16px;
            font-weight: 500;
        }
        .actions {
            display: flex;
            gap: 10px;
        }
        .btn-edit {
            background: #007bff;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-edit:hover {
            background: #0056b3;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-delete:hover {
            background: #bd2130;
        }
        .empty-message {
            text-align: center;
            color: #777;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header-section">
        <h2>Автори книг</h2>
        <a href="{% url 'author_create' %}" class="btn-add">+ Додати автора</a>
    </div>

    {% for author in authors %}
        <div class="author-card">
            <div class="author-name">
                {{ author.surname }} {{ author.name }} {{ author.patronymic|default:"" }}
            </div>
            <div class="actions">
                <a href="{% url 'author_edit' author.id %}" class="btn-edit">Редагувати</a>

                <a href="{% url 'author_delete' author.id %}" class="btn-delete">Видалити</a>
            </div>
        </div>
    {% empty %}
        <div class="empty-message">
            У базі даних поки немає жодного автора.
        </div>
    {% endfor %}

</div>

</body>
</html>
