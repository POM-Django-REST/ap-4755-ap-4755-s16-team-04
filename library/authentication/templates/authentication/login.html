<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід у систему</title>
</head>
<body>
    <h2>Авторизація користувача</h2>

    {% if error %}
        <p style="color: red; font-weight: bold;">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        {% for field in form %}
            <p>
                <label for="{{ field.id_for_label }}">{{ field.label }}:</label><br>
                {{ field }}

                {% if field.errors %}
                    <br><span style="color: red; font-size: 0.85em;">{{ field.errors.0 }}</span>
                {% endif %}
            </p>
        {% endfor %}

        <button type="submit">Увійти</button>
    </form>

    <p>Ще не зареєстровані? <a href="/auth/register/">Створити акаунт</a></p>
</body>
</html>
